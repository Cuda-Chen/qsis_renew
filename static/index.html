<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title">Siesmic Monitoring</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

        :root {
            --bg-dark: #0a0f1c;
            --panel-bg: rgba(30, 41, 59, 0.4);
            --text-main: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0a0f1c 70%);
            color: var(--text-main);
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sidebar {
            width: 100px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 12px;
            gap: 20px;
        }

        .sidebar-title {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5em;
            color: #94a3b8;
            margin-bottom: auto;
        }
        
        .download-btn {
            background-color: var(--accent-green);
            color: var(--bg-dark);
            border: none;
            border-radius: 6px;
            padding: 12px 0px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease-in-out;
            text-align: center;
        }
        
        .download-btn:hover {
            opacity: 1;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 9999px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            font-weight: 500;
            font-size: 0.875rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .panel {
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: var(--glow);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.70rem;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .waveform-container, .spectro-container {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            background: transparent;
        }

        .playhead {
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green), 0 0 5px var(--accent-green);
            z-index: 10;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .axis-label {
            position: absolute;
            color: #64748b;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            pointer-events: none;
        }

        .clip-zone {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            pointer-events: none;
            z-index: 5;
        }

        .clip-zone.top {
            top: 0;
            background: linear-gradient(to bottom, rgba(239, 68, 68, 0.35), transparent);
        }

        .clip-zone.bottom {
            bottom: 0;
            background: linear-gradient(to top, rgba(239, 68, 68, 0.35), transparent);
        }

        .sidebar-control {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .sidebar-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .sidebar-value {
            font-size: 0.7rem;
            color: #f8fafc;
            font-family: 'Courier New', monospace;
        }

        #gainSlider {
            width: 80%;
            accent-color: var(--accent-green);
            cursor: pointer;
        }

        .toggle-group {
            display: flex;
            gap: 2px;
            width: 100%;
        }

        .toggle-btn {
            flex: 1;
            padding: 4px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: #64748b;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.15s ease;
        }

        .toggle-btn.active {
            background: var(--accent-green);
            color: var(--bg-dark);
            border-color: var(--accent-green);
        }

        .toggle-btn:hover:not(.active) {
            color: #94a3b8;
            border-color: #475569;
        }

        .color-scale {
            width: 12px;
            height: 100%;
            position: absolute;
            right: 8px;
            top: 0;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            background: linear-gradient(
                to bottom,
                hsl(0, 100%, 50%),
                hsl(30, 100%, 50%),
                hsl(60, 100%, 50%),
                hsl(120, 100%, 50%),
                hsl(180, 100%, 50%),
                hsl(210, 100%, 50%),
                hsl(240, 100%, 50%),
                hsl(270, 100%, 5%)
            );
            z-index: 15;
            pointer-events: none;
        }

        .color-scale-label {
            position: absolute;
            right: 26px;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            color: #94a3b8;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-title" data-i18n="sidebar_title">功能</div>
        <button id="downloadMseedBtn" class="download-btn" data-i18n="download_btn">下載<br/>MiniSEED</button>
        <div class="sidebar-control">
            <label class="sidebar-label" data-i18n="scale_label">SCALE</label>
            <div class="toggle-group">
                <button id="btnLin" class="toggle-btn active">LIN</button>
                <button id="btnLog" class="toggle-btn">LOG</button>
            </div>
        </div>
        <div class="sidebar-control">
            <label class="sidebar-label" data-i18n="gain_label">GAIN</label>
            <input type="range" id="gainSlider" min="0.1" max="10" step="0.1" value="1.0">
            <span id="gainValue" class="sidebar-value">1.0x</span>
        </div>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1 data-i18n="main_header">QSIS資料處理系統</h1>
            <div class="status-badge" id="conn-status">
                <div class="status-dot"></div>
                <span data-i18n="status_connecting">Connecting...</span>
            </div>
        </div>

        <!-- Waveform Panel (Z, N, E combined) -->
        <div class="panel" style="flex: 2; display: flex; flex-direction: column;">
            <div class="panel-header">
                <span data-i18n="panel_waveforms">波形串流 (Z, N, E)</span>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 2px;">
                <!-- Z Component -->
                <div class="waveform-container" style="flex: 1; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <canvas id="canvasZ"></canvas>
                    <div class="grid-overlay"></div>
                    <div class="playhead"></div>
                    <div class="clip-zone top"></div>
                    <div class="clip-zone bottom"></div>
                    <div class="axis-label" style="top: 5px; left: 10px;" data-i18n="axis_z">Z (Blue)</div>
                    <div class="axis-label time-right" style="bottom: 5px; right: 10px;">NOW</div>
                </div>
                <!-- N Component -->
                <div class="waveform-container" style="flex: 1; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <canvas id="canvasN"></canvas>
                    <div class="grid-overlay"></div>
                    <div class="playhead"></div>
                    <div class="clip-zone top"></div>
                    <div class="clip-zone bottom"></div>
                    <div class="axis-label" style="top: 5px; left: 10px;" data-i18n="axis_n">N (Green)</div>
                </div>
                <!-- E Component -->
                <div class="waveform-container" style="flex: 1;">
                    <canvas id="canvasE"></canvas>
                    <div class="grid-overlay"></div>
                    <div class="playhead"></div>
                    <div class="clip-zone top"></div>
                    <div class="clip-zone bottom"></div>
                    <div class="axis-label" style="top: 5px; left: 10px;" data-i18n="axis_e">E (Red)</div>
                    <div class="axis-label time-left" style="bottom: 5px; left: 10px;">T-60s</div>
                </div>
            </div>
        </div>

        <!-- Spectrogram Panel -->
        <div class="panel" style="flex: 1.5;">
            <div class="panel-header">
                <span data-i18n="panel_spec">時頻圖/頻譜 (1s Overlap)</span>
            </div>
            <div class="spectro-container">
                <canvas id="spectroCanvas"></canvas>
                <!-- Color Scale Legend -->
                <div class="color-scale"></div>
                <div class="color-scale-label" style="top: 4px;">MAX</div>
                <div class="color-scale-label" style="bottom: 20px;">MIN</div>
                <!-- Horizontal Axis: Time -->
                <div class="axis-label time-right" style="bottom: 5px; right: 10px;">NOW (-2s)</div>
                <div class="axis-label time-left" style="bottom: 5px; left: 10px;">T-60s</div>
                <!-- Vertical Axis: Frequency -->
                <div class="axis-label" style="bottom: 20px; left: 10px;">0.5 Hz</div>
                <div class="axis-label" style="top: 10px; left: 10px;">50.0 Hz</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
