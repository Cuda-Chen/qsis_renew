<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siesmic Monitoring</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #334155;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sidebar {
            width: 80px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5em;
            color: #94a3b8;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 9999px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            font-weight: 500;
            font-size: 0.875rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .waveform-container {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #000;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .spectro-container {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #000;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .axis-label {
            position: absolute;
            color: #64748b;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">功能</div>
    
    <div class="main-content">
        <div class="header">
            <h1>QSIS資料處理系統</h1>
            <div class="status-badge" id="conn-status">
                <div class="status-dot"></div>
                Connecting...
            </div>
        </div>

        <!-- Waveform Panel Z -->
        <div class="panel" style="flex: 1;">
            <div class="panel-header">
                <span>波形串流 Z</span>
            </div>
            <div class="waveform-container">
                <canvas id="canvasZ"></canvas>
                <div class="grid-overlay"></div>
                <div class="axis-label" style="bottom: 5px; right: 10px;">Z (Blue)</div>
            </div>
        </div>

        <!-- Waveform Panel N (Y mapping) -->
        <div class="panel" style="flex: 1;">
            <div class="panel-header">
                <span>波形串流 N</span>
            </div>
            <div class="waveform-container">
                <canvas id="canvasN"></canvas>
                <div class="grid-overlay"></div>
                <div class="axis-label" style="bottom: 5px; right: 10px;">N (Green)</div>
            </div>
        </div>

        <!-- Waveform Panel E (X mapping) -->
        <div class="panel" style="flex: 1;">
            <div class="panel-header">
                <span>波形串流 E</span>
            </div>
            <div class="waveform-container">
                <canvas id="canvasE"></canvas>
                <div class="grid-overlay"></div>
                <div class="axis-label" style="bottom: 5px; right: 10px;">E (Red)</div>
            </div>
        </div>

        <!-- Spectrogram Panel -->
        <div class="panel" style="flex: 1.5;">
            <div class="panel-header">
                <span>時頻圖/頻譜</span>
            </div>
            <div class="spectro-container">
                <canvas id="spectroCanvas"></canvas>
                <div class="axis-label" style="bottom: 5px; left: 10px;">0.5 Hz</div>
                <div class="axis-label" style="bottom: 5px; right: 10px;">50.0 Hz</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
