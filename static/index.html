<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siesmic Monitoring</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #334155;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 24px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 9999px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            font-weight: 500;
            font-size: 0.875rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .waveform-container {
            flex: 1;
            position: relative;
            width: 100%;
            min-height: 250px;
            overflow: hidden;
            background: #000;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .spectro-container {
            height: 250px;
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #000;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .axis-label {
            position: absolute;
            color: #64748b;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Seismic Target: Station Z</h1>
        <div class="status-badge" id="conn-status">
            <div class="status-dot"></div>
            Connecting...
        </div>
    </div>

    <!-- Waveform Panel -->
    <div class="panel" style="flex: 1;">
        <div class="panel-header">
            <span>High-Speed Waveform (2-Second Delay Sync)
                <span style="color:#ef4444; margin-left:12px; font-weight:700;">X</span>
                <span style="color:#10b981; margin-left:6px; font-weight:700;">Y</span>
                <span style="color:#3b82f6; margin-left:6px; font-weight:700;">Z</span>
            </span>
            <span id="scale-indicator" style="font-family: monospace; color: var(--text-main);">±3.0G</span>
        </div>
        <div class="waveform-container">
            <canvas id="waveformCanvas"></canvas>
            <div class="grid-overlay"></div>
            <!-- Labels -->
            <div class="axis-label" style="top: 10px; left: 10px;">+3.0G</div>
            <div class="axis-label" style="bottom: 10px; left: 10px;">-3.0G</div>
            <div class="axis-label" style="bottom: 10px; right: 10px;">NOW (-2s)</div>
            <div class="axis-label" style="bottom: 10px; left: 60px;">T-5s</div>
        </div>
    </div>

    <!-- Spectrogram Panel -->
    <div class="panel">
        <div class="panel-header">
            <span>Vertical Spectrogram (0.5Hz - 20Hz)</span>
            <span>2s Chunking</span>
        </div>
        <div class="spectro-container">
            <canvas id="spectroCanvas"></canvas>
            <!-- Overlay axis labels for Spectro -->
            <div class="axis-label" style="bottom: 5px; left: 10px;">0.5 Hz</div>
            <div class="axis-label" style="bottom: 5px; right: 10px;">20.0 Hz</div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
